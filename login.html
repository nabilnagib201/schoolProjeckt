<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/style-login.css">
    <title>login-تسجيل الدخول</title>
</head>

    <h1 class="loginN">تسجيل الدخول الي <span class="highlight">SOFT WEB</span></h1>
    <img src="static/images/softWebLogo.png" alt="School Image" class="school-image">
    <form class="from" action="/login" method="post">
        <label for="user">اسم المستخدم :</label>
        <input type="text" id="user" name="user" required><br><br>

        <label for="password">كلمه المرور :</label>
        <input type="password" id="password" name="password" required><br><br>

        <input class="btn-login" type="submit" value="تسجيل الدخول"><br>
        <br><p>اذا كان يواجهك خطاء تواصل مع 01030891803</p>
    </form>
    <a href="index.html">الصفحة الرئيسية</a>
    <a href="https://www.instagram.com/soft_wep/">تواصل عبر انستجرام</a>
    <script>
document.addEventListener('DOMContentLoaded', function() {
    
    const loginForm = document.querySelector('form'); 

    if (loginForm) {
        loginForm.addEventListener('submit', function(event) {
            
            event.preventDefault();

            const userField = document.getElementById('user');
            const passwordField = document.getElementById('password');

            const username = userField.value;
            const password = passwordField.value;

            if (username === 'school' && password === 'ali') {
                window.location.replace('users/main.html');  
            } else {
                alert('خطأ في اسم المستخدم أو كلمة المرور!');
                passwordField.value = '';
            }
        });
    }
});
    </script>
</body>

</html>
