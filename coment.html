<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>صفحة التعليقات</title>
     <link rel="icon" href="static/images/logo.jpeg">

</head>
<body>

 <h1 class="page-title">💬 التعليقات</h1>
<p>شاركنا رايك حول موقعنا.</p>
<p>سياستنا تمنع اي كلمات غير مصرح بها وفقا لقانون مدرسي و تعاقب عليها !</p>
<div class="comments-container">

  <input type="text" id="name" placeholder="اكتب اسمك">
  <textarea id="comment" rows="4" placeholder="اكتب تعليقك هنا..."></textarea>
  <button onclick="addComment()">إرسال</button>

  <div id="comments-list"></div>
</div>

<div class="transfers">
    <div class="box-transfers">
    <a class="transfers-1" href="index.html">صفحه رئيسية</a>
    <a class="transfers-1" href="we.html">عنا</a>
    <a class="transfers-1" href="Theater.html">الفعاليات مسرحية</a>
    <a class="transfers-1" href="news.html">الاخبار</a>
    </div>
</div>

<script>
 // الكلمات الممنوعة
    const bannedWords = ["كلب", "حيوان", "زبالة" , "كسمك", "كس", "عرص", "معرص", "خول", "مخول", "kos", "kosomk", "a7a", "A7a", "A7A", "a7A", "Kos", "جزمه","حيوانه","بعجه","احا","احات","شرموطه","fuck","fack","فاك","3ars","5oal","متناك","متناكه","شرموط","بيض","بضان"];

    // دالة تتحقق من وجود كلمة ممنوعة
    function containsBannedWord(text) {
      text = text.toLowerCase(); // حسّس الأحرف
      return bannedWords.some(word => text.includes(word));
    }

    function addComment() {
      const name = document.getElementById("name").value.trim();
      const comment = document.getElementById("comment").value.trim();

      // تحقق من الحقول الفارغة
      if (!name || !comment) {
        alert("من فضلك املأ جميع الحقول");
        return;
      }

      // تحقق من الكلمات الممنوعة
      if (containsBannedWord(name) || containsBannedWord(comment)) {
        alert("يوجد كلمات غير مسموح بها في الاسم أو التعليق. يرجى التعديل.");
        return;
      }

      const commentBox = document.createElement("div");
      commentBox.classList.add("comment-box");

      // نحافظ على تنسيق الأسطر داخل التعليق
      const safeComment = comment.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");

      // إضافة التعليق إلى الصفحة
      commentBox.innerHTML = `<strong>${name}</strong><p>${safeComment}</p>`;
      document.getElementById("comments-list").appendChild(commentBox);

      // مسح الحقول بعد الإرسال
      document.getElementById("name").value = "";
      document.getElementById("comment").value = "";
    }
</script>

</body>
</html>
