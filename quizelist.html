<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الامتحانات-qizeList</title>
    <!-- css file -->
    <link rel="stylesheet" href="static/css/style.css">
    <!-- normalize file -->
    <link rel="stylesheet" href="static/css/normalize.css">
    <!-- Icons file -->
    <link rel="stylesheet" href="static/css/all.min.css">
    <!-- The web font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"

     <link rel="icon" href="static/images/logo.jpeg">

</head>

<body id="quiz-list">
    <header>
        <div class="container">
            <div class="logoA">
                <div class="imgA"><img src="images/Gharbia Directorate of Education emblem.png" alt=""></div>
                <h1>الشهيد علي زكريا </h1>
            </div>
        </div>

    </header>
    <div class="subjects-list">
        <div class="container">
            <div class="subjects-content">
                <div class="box">
                    <div class="img"><img src="static/images/arabicpng.png" alt=""></div>
                    <h3>اللغة العربية</h3>
                    <button id="arabic">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/historyjfif.jfif" alt=""></div>
                    <h3>تاريخ</h3>
                    <button id="history">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/aflatoon3.jfif" alt=""></div>
                    <h3>فلسفة</h3>
                    <button id="phi">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/EN.jfif" alt=""></div>
                    <h3>English</h3>
                    <button id="english">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/maths.jfif" alt=""></div>
                    <h3>رياضيات</h3>
                    <button id="math">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/14a902fd15ca623a7337c1412661180e.jpg" alt=""></div>
                    <h3>علوم متكاملة</h3>
                    <button id="science">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/frensh.jfif" alt="">
                    </div>
                    <h3>le français</h3>
                    <button id="frensh">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/Ict.jpg" alt=""></div>
                    <h3>تكنولوجيا</h3>
                    <button id="ict">ادخل الاختبار</button>
                </div>
                <div class="box">
                    <div class="img"><img src="static/images/region.jfif" alt=""></div>
                    <h3>التربية الدينية الاسلامية</h3>
                    <button id="islam">ادخل الاختبار</button>
                </div>

                <div class="box">
                    <div class="img"><img src="static/images/knish.jpeg" alt="">
                    </div>
                    <h3>التربية الدينية المسيحية</h3>
                    <button id="christianity">ادخل للامتحان</button>

                </div>
            </div>
        </div>

    <script src="main.js"></script>
